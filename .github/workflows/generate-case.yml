name: Generate New Case Study (Phase 2)

# 이 워크플로우는 Anthropic Claude API를 사용해 새 케이스를 생성하고 PR로 제출합니다.
# 활성화 조건:
#   1. 레포 Settings > Secrets and variables > Actions 에서 ANTHROPIC_API_KEY 추가
#   2. 아래 schedule 주석을 해제하면 매주 자동 실행 (또는 수동 트리거 가능)

on:
  workflow_dispatch:
    inputs:
      topic:
        description: '케이스 주제 (예: "Post-merger integration", "DEI announcement")'
        required: true
        default: 'M&A post-merger integration'
      category:
        description: '카테고리'
        required: false
        default: 'Strategic HR'
  # schedule:
  #   - cron: '0 21 * * 0'  # 매주 월요일 06:00 KST

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate case via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ inputs.topic }}
          CATEGORY: ${{ inputs.category }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const Anthropic = require('@anthropic-ai/sdk').default;
          const client = new Anthropic();

          const topic = process.env.TOPIC;
          const category = process.env.CATEGORY;
          const existingCases = fs.readFileSync('./cases.js', 'utf8');
          const guide = fs.readFileSync('./docs/ADDING-CASES.md', 'utf8');

          const prompt = `You are generating a new business English case study for an HR English learning app.

Topic: ${topic}
Category: ${category}

Follow the schema and writing guidelines exactly as described below:

${guide}

Reference an existing case from this file for style and format consistency:
\`\`\`js
${existingCases.slice(0, 8000)}
\`\`\`

Output ONLY a single valid JavaScript object literal (no \`const\`, no surrounding array, no comments, no explanation). The object must be parseable as the next item to push into the CASES array.

Requirements:
- All three difficulty levels (beginner / intermediate / advanced)
- Both en and ko for briefing and caseStudy
- Beginner: 3 questions / Intermediate: 5 questions / Advanced: 3 questions
- Glossary: 25-35 HR-relevant terms with Korean definitions
- Use a fictional company name (not real)
- HR perspective (HRBP or CHRO advising CEO)
- Realistic business tension and tradeoffs`;

          const res = await client.messages.create({
            model: 'claude-sonnet-4-6',
            max_tokens: 16000,
            messages: [{ role: 'user', content: prompt }]
          });

          let text = res.content[0].text.trim();
          // Strip code fences if present
          text = text.replace(/^```(?:js|javascript|json)?\n?/, '').replace(/\n?```$/, '');

          // Validate by evaluating
          const newCase = eval('(' + text + ')');
          if (!newCase.id || !newCase.title || !newCase.questions) {
            throw new Error('Generated case missing required fields');
          }

          // Append to cases.js
          const insertionPoint = existingCases.lastIndexOf('];');
          if (insertionPoint < 0) throw new Error('Cannot find CASES array end');
          const before = existingCases.slice(0, insertionPoint);
          const after = existingCases.slice(insertionPoint);
          const updated = before.trimEnd() + ',\n  ' + text + '\n' + after;
          fs.writeFileSync('./cases.js', updated);

          // Quick syntax check
          require('./cases.js');
          console.log('Case generated and validated:', newCase.id);
          fs.writeFileSync('/tmp/case_id.txt', newCase.id);
          fs.writeFileSync('/tmp/case_title.txt', newCase.titleKo + ' — ' + newCase.title);
          EOF

      - name: Read case metadata
        id: meta
        run: |
          echo "id=$(cat /tmp/case_id.txt)" >> "$GITHUB_OUTPUT"
          echo "title=$(cat /tmp/case_title.txt)" >> "$GITHUB_OUTPUT"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add auto-generated case: ${{ steps.meta.outputs.title }}"
          title: "Add case study: ${{ steps.meta.outputs.title }}"
          branch: "auto/case-${{ steps.meta.outputs.id }}"
          body: |
            ## 자동 생성된 케이스 스터디

            **ID**: `${{ steps.meta.outputs.id }}`
            **제목**: ${{ steps.meta.outputs.title }}
            **주제**: ${{ inputs.topic }}
            **카테고리**: ${{ inputs.category }}

            ### 리뷰 체크리스트
            - [ ] 회사명/인물명이 가상인지 확인
            - [ ] 3단계 난이도 모두 작성됨
            - [ ] 영문/한글 모두 작성됨
            - [ ] 비즈니스 정확성 (HR 시나리오로 현실적인지)
            - [ ] 한글 번역 자연스러운지
            - [ ] Glossary 용어 적절한지
            - [ ] 로컬에서 동작 확인 (`python3 -m http.server 8000`)

            문제가 있으면 PR을 닫고 워크플로우를 다시 트리거하세요.
